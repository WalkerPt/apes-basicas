yaml

name: Publish F-Droid repo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check index files (example)
        run: |
          echo "Verificando que o repo/index-v2.json e repo/index-v1.json existem"
          ls -la repo/index-*.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload repo files
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./repo

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
